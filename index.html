<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Club</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:340px;
background:white;
border-radius:20px;
padding:25px;
box-shadow:0 15px 35px rgba(0,0,0,.15);
text-align:center;
}

.logo{
font-size:30px;
}

h1{
margin-top:10px;
color:#ff9800;
}

.name{
font-size:24px;
margin-top:20px;
font-weight:bold;
}

.points{
margin-top:10px;
font-size:18px;
}

.progress{
width:100%;
height:18px;
background:#ddd;
border-radius:20px;
margin-top:20px;
overflow:hidden;
}

.bar{
height:100%;
width:50%;
background:#ff9800;
border-radius:20px;
}

.reward{
margin-top:20px;
font-size:18px;
color:green;
font-weight:bold;
}

.footer{
margin-top:20px;
color:#777;
font-size:14px;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">⭐</div>

<h1>Creator Club</h1>

<div class="name">
Jesús
</div>

<div class="points">
5 puntos
</div>

<div class="progress">
<div class="bar"></div>
</div>

<p style="margin-top:10px;">5 de 10 compras</p>

<div class="reward">
🎁 Te faltan 5 compras
</div>

<div class="footer">
Gracias por ser parte del club 💛
</div>

</div>

</body>
</html>
