<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Club</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">
  
<div class="header">
    <span class="club">⭐ Creator Club</span>
    <span class="status">ACTIVO</span>
</div>
  
<div class="logo">
    <img src="logo.png" alt="Creator Club">
</div>

<h1>Creator Club</h1>

<div class="name" id="nombre">
Cargando...
</div>
  
  <div class="level" id="nivel">
Cargando nivel...
</div>
  <div class="member-id" id="memberId">
Miembro #0000
</div>
  <div class="join-date" id="fecha">
Miembro desde: --
</div>
  
<div class="points" id="puntos">
Cargando puntos...
</div>

<div class="progress">
<div class="bar" id="barra"></div>
</div>
  
<div class="progress-text" id="progresoTexto">
0% completado
</div>
  
<p style="margin-top:10px;" id="compras">
Cargando compras...
</p>
  
<div class="reward" id="recompensa">
Cargando recompensa...
</div>
  
<div class="footer">
Gracias por ser parte del club 💛
</div>

</div>
<script src="script.js"></script>
</body>
</html>
