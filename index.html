<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creator Club</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
width:340px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
text-align:center;
}

h1{
color:#ff9800;
margin-bottom:5px;
}

.progress{
width:100%;
height:20px;
background:#ddd;
border-radius:30px;
overflow:hidden;
margin-top:15px;
}

.fill{
width:50%;
height:100%;
background:#ff9800;
}

.reward{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:green;
}
</style>

</head>

<body>

<div class="card">

<h1>⭐ Creator Club</h1>

<h2>Jesús</h2>

<p>Puntos: <b>5</b></p>

<div class="progress">
<div class="fill"></div>
</div>

<p>5 de 10 compras</p>

<div class="reward">
🎁 Te faltan 5 compras
</div>

</div>

</body>
</html>
